
services:
  app:
    build: .
    container_name: telegram_bot_app
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
    command: >
      uvicorn src.main:app --host 0.0.0.0 --port 8000

  db:
    image: postgres:15
    container_name: telegram_bot_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telegram_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ngrok:
    image: ngrok/ngrok:latest
    command: http app:8000 --log=stdout
    environment:
      NGROK_AUTHTOKEN: 3CG5ROZCKm4ZrYmgISLBvE3FDRV_72MyA8vzWgu7Gkh6Gngtg
    ports:
      - "4040:4040"
    depends_on:
      - app
volumes:
  postgres_data: